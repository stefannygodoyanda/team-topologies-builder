<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Topologies Builder - Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tt-stream: #FFEDB8; --tt-stream-b: #FFD966;
      --tt-enable: #DFBDCF; --tt-enable-b: #D09CB7;
      --tt-complex: #FFC08B; --tt-complex-b: #E88814;
      --tt-platform: #B7CDF1; --tt-platform-b: #6D9EEB;
      --tt-collab: #C6BEDF; --tt-collab-b: #967EE2;
      --tt-facil: #C9DFBE; --tt-facil-b: #78996B;
      --tt-xaas: #B4B4B4; --tt-xaas-b: #999696;
      --tt-undef: #EBEBEF; --tt-undef-b: #9B99AF;
      --bg: #ffffff;
      --panel: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --muted: #6b6b65;
      --hint: #9b9b95;
      --canvas-dot: rgba(0,0,0,0.08);
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --sel-color: #3498db;
    }

    html, body { height: 100%; font-family: 'Syne', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .app { display: grid; grid-template-columns: 300px 1fr; grid-template-rows: 52px 1fr; height: 100vh; position: relative; }

    /* Topbar */
    .topbar {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; padding: 0 20px;
      background: var(--panel); border-bottom: 0.5px solid var(--border); z-index: 10;
    }
    .logo { font-size: 14px; font-weight: 700; letter-spacing: -0.03em; }
    .topbar-right { display: flex; gap: 8px; align-items: center; margin-left: auto; }
    .badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; background: var(--border); color: var(--muted); }
    .btn {
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 7px;
      border: 0.5px solid var(--border); background: transparent; color: var(--text);
      cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--text); color: var(--panel); border-color: var(--text); }
    .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* Sidebar */
    .sidebar {
      background: var(--panel); border-right: 0.5px solid var(--border);
      overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 0; padding-bottom: 20px; z-index: 5;
    }
    .sidebar-section { padding: 16px 16px 8px; }
    .sidebar-section + .sidebar-section { border-top: 0.5px solid var(--border); }
    .sec-title { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--hint); margin-bottom: 10px; }

    .team-card {
      padding: 9px 12px; border-radius: 8px; border: 1px solid transparent; cursor: grab; user-select: none;
      transition: transform .15s, box-shadow .15s; margin-bottom: 5px;
    }
    .team-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .tc-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .tc-desc { font-size: 10px; line-height: 1.45; opacity: .65; }

    .tc-stream  { background: var(--tt-stream);  border-color: var(--tt-stream-b);  }
    .tc-enable  { background: var(--tt-enable);  border-color: var(--tt-enable-b);  }
